<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Religion Träning</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}
.screen { display: none; padding: 20px; }
.active { display: block; }

button {
  width: 90%;
  padding: 18px;
  margin: 10px 0;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: #222;
  color: white;
}

button.secondary { background: #666; }
.correct { background: #2ecc71 !important; }
.wrong { background: #e74c3c !important; }

h1 { margin-bottom: 20px; }
.question { font-size: 24px; margin: 30px 0; }
input {
  width: 90%;
  padding: 15px;
  font-size: 20px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="screen active">
  <h1>Religion</h1>
  <button onclick="go('train')">Träna</button>
  <button onclick="startTest()">Test</button>
  <button onclick="startImage()">Öva med bilder</button>
  <button onclick="startQuick()">Snabbquiz</button>
</div>

<!-- TRAIN -->
<div id="train" class="screen">
  <h1>Välj</h1>
  <button onclick="setMode('alla','symbol')">Symboler</button>
  <button onclick="setMode('alla','profet')">Profeter</button>
  <button onclick="setMode('alla','skrift')">Helig skrift</button>
  <button onclick="setMode('alla','plats')">Helig plats</button>
  <button onclick="setMode('alla','högtid')">Högtider</button>
  <button class="secondary" onclick="go('start')">Tillbaka</button>
</div>

<!-- QUESTION -->
<div id="question" class="screen">
  <div class="question" id="q"></div>
  <input id="answer" placeholder="Skriv svar..." onkeypress="enterCheck(event)">
  <button onclick="check()">OK</button>
  <button class="secondary" onclick="go('start')">Avsluta</button>
</div>

<!-- TEST RESULT -->
<div id="result" class="screen">
  <h1>Resultat</h1>
  <div id="score"></div>
  <button onclick="go('start')">Start</button>
</div>

<script>
const data = {
  kristendom: {
    symbol: "kors",
    profet: "jesus",
    skrift: "bibeln",
    plats: "kyrka",
    högtid: "påsk"
  },
  judendom: {
    symbol: "davidsstjärna",
    profet: "mose",
    skrift: "torah",
    plats: "synagoga",
    högtid: "pesach"
  },
  islam: {
    symbol: "halvmåne",
    profet: "muhammed",
    skrift: "koranen",
    plats: "moské",
    högtid: "ramadan"
  }
};

let currentCategory;
let currentReligion;
let correctAnswer;
let score = 0;
let total = 0;
let testMode = false;

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function randomReligion(){
  return Object.keys(data)[Math.floor(Math.random()*3)];
}

function setMode(rel, cat){
  currentCategory = cat;
  testMode = false;
  nextQuestion();
}

function nextQuestion(){
  currentReligion = randomReligion();
  correctAnswer = data[currentReligion][currentCategory];

  document.getElementById('q').innerText =
    "Vad är " + currentCategory + " i " + currentReligion + "?";

  document.getElementById('answer').value = "";
  go('question');
}

function check(){
  let input = document.getElementById('answer').value.toLowerCase();

  if(input.includes(correctAnswer)){
    score++;
    flash(true);
  } else {
    flash(false);
  }

  total++;

  if(testMode && total >= 10){
    document.getElementById('score').innerText = score + " / " + total;
    go('result');
    return;
  }

  setTimeout(nextQuestion, 600);
}

function flash(ok){
  document.body.style.background = ok ? "#2ecc71" : "#e74c3c";
  setTimeout(()=>document.body.style.background="#f5f5f5", 400);
}

function enterCheck(e){
  if(e.key === "Enter") check();
}

function startTest(){
  score = 0;
  total = 0;
  testMode = true;
  currentCategory = ["symbol","profet","skrift","plats","högtid"][Math.floor(Math.random()*5)];
  nextQuestion();
}

function startQuick(){
  score = 0;
  total = 0;
  testMode = false;
  currentCategory = ["symbol","profet","skrift","plats","högtid"][Math.floor(Math.random()*5)];
  nextQuestion();
}

function startImage(){
  alert("Bildläge kommer nästa version");
}
</script>

</body>
</html>
