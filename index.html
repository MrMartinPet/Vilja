<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Religion Träning</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
  color: #111;
}

.screen {
  display: none;
  padding: 20px 16px 40px;
}

.active {
  display: block;
}

.wrap {
  max-width: 820px;
  margin: 0 auto;
}

button {
  width: 92%;
  max-width: 560px;
  padding: 16px;
  margin: 8px 0;
  font-size: 20px;
  border: none;
  border-radius: 14px;
  background: #222;
  color: white;
  cursor: pointer;
}

button.secondary { background: #666; }
button.green { background: #2e7d32; }
button.blue { background: #1565c0; }
button.orange { background: #ef6c00; }
button.purple { background: #6a1b9a; }

h1 {
  margin-bottom: 12px;
  font-size: 34px;
}

h2 {
  font-size: 22px;
  margin: 8px 0 16px;
}

.question {
  font-size: 28px;
  margin: 26px 0 18px;
  line-height: 1.3;
  white-space: pre-line;
}

input, select, textarea {
  width: 92%;
  max-width: 560px;
  padding: 15px;
  font-size: 21px;
  border-radius: 12px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  margin: 8px 0;
}

textarea {
  min-height: 80px;
  resize: vertical;
}

.infoBox {
  width: 92%;
  max-width: 560px;
  margin: 14px auto;
  padding: 14px;
  background: white;
  border-radius: 12px;
  font-size: 18px;
  line-height: 1.45;
  text-align: left;
}

.small {
  font-size: 16px;
  color: #444;
}

.feedback {
  font-size: 22px;
  font-weight: bold;
  margin: 16px 0 8px;
  min-height: 28px;
}

.stats {
  width: 92%;
  max-width: 560px;
  margin: 10px auto 18px;
  background: white;
  border-radius: 12px;
  padding: 14px;
  font-size: 18px;
  line-height: 1.5;
}

.hidden {
  display: none;
}

.choiceWrap {
  width: 92%;
  max-width: 560px;
  margin: 0 auto 14px;
}

.choiceBtn {
  width: 100%;
  max-width: 100%;
  margin: 6px 0;
  background: white;
  color: #111;
  border: 2px solid #ddd;
}

.choiceBtn.correct {
  background: #dff5e5;
  border-color: #2e7d32;
}

.choiceBtn.wrong {
  background: #fbe4e2;
  border-color: #c62828;
}

.gridButtons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}

.gridButtons button {
  width: calc(50% - 8px);
  max-width: 275px;
}

.onepagerGrid {
  width: 92%;
  max-width: 780px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.oneRow {
  background: white;
  border-radius: 12px;
  padding: 12px;
  text-align: left;
}

.oneRow label {
  display: block;
  font-weight: bold;
  margin-bottom: 6px;
}

.resultLine {
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.resultLine:last-child {
  border-bottom: none;
}

.good {
  color: #2e7d32;
  font-weight: bold;
}

.bad {
  color: #c62828;
  font-weight: bold;
}
</style>
</head>

<body>
<div class="wrap">

  <div id="start" class="screen active">
    <h1>Religion</h1>
    <button onclick="go('trainMenu')">Träna kategori</button>
    <button onclick="go('reverseMenu')">Träna tvärtom</button>
    <button onclick="startQuick()">Snabbquiz</button>
    <button onclick="startFinalTest()">Slutprov</button>
    <button class="purple" onclick="go('onepagerMenu')">Onepager</button>
  </div>

  <div id="trainMenu" class="screen">
    <h1>Träna</h1>
    <h2>Välj område</h2>
    <div class="gridButtons">
      <button onclick="setTrainingMode('utbredning')">Utbredning</button>
      <button onclick="setTrainingMode('grupper')">Grupper</button>
      <button onclick="setTrainingMode('anhangare')">Antal anhängare</button>
      <button onclick="setTrainingMode('heligPlats')">Helig plats</button>
      <button onclick="setTrainingMode('forkunnare')">Förkunnare</button>
      <button onclick="setTrainingMode('trorPa')">Tror på</button>
      <button onclick="setTrainingMode('symbol')">Symbol</button>
      <button onclick="setTrainingMode('profet')">Profet</button>
      <button onclick="setTrainingMode('skrift')">Helig skrift</button>
      <button onclick="setTrainingMode('hogtid')">Högtider</button>
      <button class="green" onclick="setTrainingMode('alla')">Alla blandat</button>
    </div>
    <button class="secondary" onclick="go('start')">Tillbaka</button>
  </div>

  <div id="reverseMenu" class="screen">
    <h1>Tvärtom</h1>
    <h2>Fråga från fakta till religion</h2>
    <div class="gridButtons">
      <button onclick="setReverseMode('symbol')">Symbol till religion</button>
      <button onclick="setReverseMode('profet')">Profet till religion</button>
      <button onclick="setReverseMode('skrift')">Skrift till religion</button>
      <button onclick="setReverseMode('heligPlats')">Plats till religion</button>
      <button onclick="setReverseMode('hogtid')">Högtid till religion</button>
      <button onclick="setReverseMode('anhangare')">Anhängare till religion</button>
      <button onclick="setReverseMode('utbredning')">Utbredning till religion</button>
    </div>
    <button class="secondary" onclick="go('start')">Tillbaka</button>
  </div>

  <div id="question" class="screen">
    <h1 id="modeTitle">Fråga</h1>

    <div class="stats" id="liveStats"></div>

    <div class="question" id="q"></div>

    <input id="answer" placeholder="Skriv svar..." onkeypress="enterCheck(event)">

    <div id="choices" class="choiceWrap hidden"></div>

    <div class="feedback" id="feedback"></div>

    <div class="infoBox hidden" id="hintBox"></div>
    <div class="infoBox hidden" id="peekBox"></div>

    <button class="green" id="okBtn" onclick="check()">OK</button>

    <button class="blue" id="hintBtn" onclick="showHint()">Ledtråd</button>
    <button class="orange" id="peekBtn" onclick="showPeek()">Tjuvtitta</button>

    <button class="secondary" onclick="go('start')">Avsluta</button>
  </div>

  <div id="roundDone" class="screen">
    <h1>Rundan klar</h1>
    <div class="stats" id="roundStats"></div>
    <button class="green" onclick="restartSameMode()">Kör igen</button>
    <button class="secondary" onclick="go('start')">Till start</button>
  </div>

  <div id="result" class="screen">
    <h1>Resultat</h1>
    <div class="stats" id="score"></div>
    <button class="green" onclick="go('start')">Start</button>
  </div>

  <div id="onepagerMenu" class="screen">
    <h1>Onepager</h1>
    <h2>Välj religion</h2>
    <button onclick="openOnepager('kristendom')">Kristendom</button>
    <button onclick="openOnepager('judendom')">Judendom</button>
    <button onclick="openOnepager('islam')">Islam</button>
    <button class="secondary" onclick="go('start')">Tillbaka</button>
  </div>

  <div id="onepager" class="screen">
    <h1 id="onepagerTitle">Onepager</h1>
    <div class="small">Fyll i allt du kan. Tryck sedan på Rätta.</div>

    <div class="onepagerGrid" id="onepagerFields"></div>

    <div class="stats hidden" id="onepagerResult"></div>

    <button class="green" onclick="checkOnepager()">Rätta</button>
    <button class="blue" onclick="fillOnepagerHints()">Visa facit</button>
    <button class="secondary" onclick="go('onepagerMenu')">Tillbaka</button>
  </div>

</div>

<script>
const data = {
  kristendom: {
    utbredning: "europa, nord och sydamerika, sodra afrika",
    grupper: "protestanter, katoliker och ortodoxa",
    anhangare: "ca 2,6 miljarder",
    heligPlats: "kyrka, katedral, jerusalem",
    forkunnare: "prast",
    trorPa: "gud",
    symbol: "kors",
    profet: "jesus, abraham",
    skrift: "bibeln",
    hogtid: "pask, jul"
  },
  judendom: {
    utbredning: "israel",
    grupper: "ultraortodoxa, ortodoxa, liberala",
    anhangare: "ca 20 miljoner",
    heligPlats: "synagoga, klagomuren, jerusalem",
    forkunnare: "rabbin",
    trorPa: "gud",
    symbol: "davidsstjarna",
    profet: "moses, abraham",
    skrift: "torah, tanakh",
    hogtid: "chanukka, pesach, bar bat mitzva"
  },
  islam: {
    utbredning: "arabiska halvon, mellanostern, pakistan, nordafrika, centralasien, turkiet",
    grupper: "shia och sunni",
    anhangare: "ca 2 miljarder",
    heligPlats: "moske, jerusalem, mekka, kaba",
    forkunnare: "imam",
    trorPa: "gud",
    symbol: "halvmane och stjarna",
    profet: "muhammed, abraham",
    skrift: "koranen",
    hogtid: "ramadan, eid al fitr"
  }
};

const categories = [
  "utbredning",
  "grupper",
  "anhangare",
  "heligPlats",
  "forkunnare",
  "trorPa",
  "symbol",
  "profet",
  "skrift",
  "hogtid"
];

const categoryNames = {
  utbredning: "utbredning",
  grupper: "grupper",
  anhangare: "antal anhängare",
  heligPlats: "helig plats",
  forkunnare: "förkunnare",
  trorPa: "tror på",
  symbol: "symbol",
  profet: "profet",
  skrift: "helig skrift",
  hogtid: "högtider"
};

let mode = "";
let selectedTrainingCategory = "";
let questionQueue = [];
let currentQuestion = null;
let currentOnepagerReligion = "";

let stats = {
  correct: 0,
  wrong: 0,
  total: 0
};

function go(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function normalize(text) {
  return (text || "")
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[()]/g, "")
    .replace(/-/g, " ")
    .replace(/\s+/g, " ")
    .replace(/bar\/bat mitzva/g, "bar bat mitzva");
}

function splitAnswers(text) {
  return normalize(text)
    .split(",")
    .map(s => s.trim())
    .filter(Boolean);
}

function resetStats() {
  stats.correct = 0;
  stats.wrong = 0;
  stats.total = 0;
}

function updateLiveStats() {
  const percent = stats.total === 0 ? 0 : Math.round((stats.correct / stats.total) * 100);
  const left = questionQueue.length;
  document.getElementById("liveStats").innerHTML =
    "Rätt: <b>" + stats.correct + "</b><br>" +
    "Fel: <b>" + stats.wrong + "</b><br>" +
    "Svarade: <b>" + stats.total + "</b><br>" +
    "Procent: <b>" + percent + "%</b><br>" +
    "Kvar i rundan: <b>" + left + "</b>";
}

function prettyReligion(name) {
  return name.charAt(0).toUpperCase() + name.slice(1);
}

function prettyValue(raw) {
  if (!raw) return "";
  return raw
    .replace("sodra", "södra")
    .replace("davidsstjarna", "Davidsstjärna")
    .replace("halvmane", "halvmåne")
    .replace("stjarna", "stjärna")
    .replace("moske", "moské")
    .replace("prast", "präst")
    .replace("arabiska halvon", "Arabiska halvön")
    .replace("mellanostern", "Mellanöstern")
    .replace("nordafrika", "Nordafrika")
    .replace("eid al fitr", "Eid al Fitr")
    .replace("kaba", "Kaba")
    .replace("pask", "Påsk")
    .replace("chanukka", "Chanukka")
    .replace("muhammed", "Muhammed")
    .replace("jesus", "Jesus")
    .replace("moses", "Moses")
    .replace("jerusalem", "Jerusalem")
    .replace("bibeln", "Bibeln")
    .replace("koranen", "Koranen")
    .replace("torah", "Torah")
    .replace("tanakh", "Tanakh")
    .replace("jul", "Jul")
    .replace("ramadan", "Ramadan")
    .replace("pesach", "Pesach");
}

function shouldUseChoices(category) {
  return ["anhangare", "utbredning", "grupper", "trorPa"].includes(category);
}

function buildTrainingQueue(category) {
  const religions = Object.keys(data);
  let list = [];

  if (category === "alla") {
    religions.forEach(religion => {
      categories.forEach(cat => {
        list.push({
          type: shouldUseChoices(cat) ? "choice" : "text",
          religion,
          category: cat,
          answer: data[religion][cat]
        });
      });
    });
  } else {
    religions.forEach(religion => {
      list.push({
        type: shouldUseChoices(category) ? "choice" : "text",
        religion,
        category,
        answer: data[religion][category]
      });
    });
  }

  return shuffle(list);
}

function buildFinalTestQueue() {
  const religions = Object.keys(data);
  let list = [];

  religions.forEach(religion => {
    categories.forEach(cat => {
      list.push({
        type: shouldUseChoices(cat) ? "choice" : "text",
        religion,
        category: cat,
        answer: data[religion][cat]
      });
    });
  });

  return shuffle(list);
}

function buildQuickQueue() {
  return shuffle(buildFinalTestQueue()).slice(0, 8);
}

function buildReverseQueue(category) {
  const religions = Object.keys(data);
  let list = [];

  religions.forEach(religion => {
    list.push({
      type: "reverseChoice",
      religion,
      category,
      answer: religion,
      promptValue: data[religion][category]
    });
  });

  return shuffle(list);
}

function setTrainingMode(category) {
  mode = "train";
  selectedTrainingCategory = category;
  resetStats();
  questionQueue = buildTrainingQueue(category);
  document.getElementById("modeTitle").innerText = "Träning";
  nextQuestion();
}

function setReverseMode(category) {
  mode = "reverse";
  selectedTrainingCategory = category;
  resetStats();
  questionQueue = buildReverseQueue(category);
  document.getElementById("modeTitle").innerText = "Tvärtom";
  nextQuestion();
}

function startFinalTest() {
  mode = "final";
  resetStats();
  questionQueue = buildFinalTestQueue();
  document.getElementById("modeTitle").innerText = "Slutprov";
  nextQuestion();
}

function startQuick() {
  mode = "quick";
  resetStats();
  questionQueue = buildQuickQueue();
  document.getElementById("modeTitle").innerText = "Snabbquiz";
  nextQuestion();
}

function restartSameMode() {
  if (mode === "train") {
    questionQueue = buildTrainingQueue(selectedTrainingCategory);
  } else if (mode === "quick") {
    questionQueue = buildQuickQueue();
  } else if (mode === "reverse") {
    questionQueue = buildReverseQueue(selectedTrainingCategory);
  } else {
    questionQueue = buildFinalTestQueue();
  }

  resetStats();
  nextQuestion();
}

function nextQuestion() {
  if (questionQueue.length === 0) {
    finishRound();
    return;
  }

  currentQuestion = questionQueue.shift();

  const answerInput = document.getElementById("answer");
  const choicesDiv = document.getElementById("choices");
  const okBtn = document.getElementById("okBtn");
  const hintBtn = document.getElementById("hintBtn");
  const peekBtn = document.getElementById("peekBtn");

  document.getElementById("feedback").innerText = "";
  document.getElementById("hintBox").classList.add("hidden");
  document.getElementById("peekBox").classList.add("hidden");
  document.getElementById("hintBox").innerText = "";
  document.getElementById("peekBox").innerText = "";
  answerInput.value = "";
  choicesDiv.innerHTML = "";
  choicesDiv.classList.add("hidden");

  if (currentQuestion.type === "reverseChoice") {
    document.getElementById("q").innerText =
      "Vilken religion passar bäst till:\n" + prettyValue(currentQuestion.promptValue) + "?";
    answerInput.classList.add("hidden");
    okBtn.classList.add("hidden");
    renderChoiceButtons(getReligionChoices(currentQuestion.religion), handleChoiceAnswer);
  } else if (currentQuestion.type === "choice") {
    document.getElementById("q").innerText =
      "Vad är " + categoryNames[currentQuestion.category] + " i " + currentQuestion.religion + "?";
    answerInput.classList.add("hidden");
    okBtn.classList.add("hidden");
    renderChoiceButtons(getCategoryChoices(currentQuestion.category, currentQuestion.answer), handleChoiceAnswer);
  } else {
    document.getElementById("q").innerText =
      "Vad är " + categoryNames[currentQuestion.category] + " i " + currentQuestion.religion + "?";
    answerInput.classList.remove("hidden");
    okBtn.classList.remove("hidden");
  }

  const trainingCheatsAllowed = (mode === "train" || mode === "quick");
  hintBtn.style.display = currentQuestion.type === "text" && trainingCheatsAllowed ? "inline-block" : "none";
  peekBtn.style.display = trainingCheatsAllowed ? "inline-block" : "none";

  updateLiveStats();
  go("question");

  setTimeout(() => {
    if (!answerInput.classList.contains("hidden")) {
      answerInput.focus();
    }
  }, 50);
}

function renderChoiceButtons(options, callback) {
  const choicesDiv = document.getElementById("choices");
  choicesDiv.classList.remove("hidden");

  options.forEach(option => {
    const btn = document.createElement("button");
    btn.className = "choiceBtn";
    btn.textContent = prettyReligionOrValue(option);
    btn.onclick = () => callback(option, btn);
    choicesDiv.appendChild(btn);
  });
}

function prettyReligionOrValue(option) {
  if (data[option]) return prettyReligion(option);
  return prettyValue(option);
}

function getReligionChoices(correctReligion) {
  const all = Object.keys(data);
  return shuffle(all);
}

function getCategoryChoices(category, correctValue) {
  const values = [...new Set(Object.values(data).map(v => v[category]))];
  return shuffle(values);
}

function handleChoiceAnswer(selected, btn) {
  const allBtns = document.querySelectorAll(".choiceBtn");
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selected === currentQuestion.answer;

  if (isCorrect) {
    btn.classList.add("correct");
    stats.correct++;
    stats.total++;
    document.getElementById("feedback").innerText = "Rätt";
    flash(true);
  } else {
    btn.classList.add("wrong");
    stats.wrong++;
    stats.total++;
    document.getElementById("feedback").innerText =
      "Fel. Rätt svar: " + prettyReligionOrValue(currentQuestion.answer);

    allBtns.forEach(b => {
      if (b.textContent === prettyReligionOrValue(currentQuestion.answer)) {
        b.classList.add("correct");
      }
    });

    flash(false);
  }

  updateLiveStats();
  setTimeout(nextQuestion, 1200);
}

function showHint() {
  if (!(mode === "train" || mode === "quick")) return;
  if (currentQuestion.type !== "text") return;

  const answer = normalize(currentQuestion.answer);
  const parts = splitAnswers(answer);
  let hintText = "";

  if (parts.length > 1) {
    hintText = "Det finns " + parts.length + " delar i svaret. Första börjar på: " +
      parts[0].charAt(0).toUpperCase();
  } else {
    hintText = "Börjar på: " + answer.charAt(0).toUpperCase() +
      " • Antal tecken: " + answer.length;
  }

  document.getElementById("hintBox").innerText = hintText;
  document.getElementById("hintBox").classList.remove("hidden");
}

function showPeek() {
  if (!(mode === "train" || mode === "quick")) return;

  let rightText = "";
  if (currentQuestion.type === "reverseChoice") {
    rightText = prettyReligion(currentQuestion.answer);
  } else {
    rightText = prettyValue(currentQuestion.answer);
  }

  document.getElementById("peekBox").innerText = "Rätt svar: " + rightText;
  document.getElementById("peekBox").classList.remove("hidden");
}

function valueMatches(input, correctAnswer) {
  const inputNorm = normalize(input);
  const correctNorm = normalize(correctAnswer);

  if (inputNorm === correctNorm) return true;

  const inputParts = splitAnswers(inputNorm).sort();
  const correctParts = splitAnswers(correctNorm).sort();

  if (inputParts.length === correctParts.length && inputParts.every((v, i) => v === correctParts[i])) {
    return true;
  }

  if (correctParts.length > 1) {
    const allIncluded = correctParts.every(part => inputNorm.includes(part));
    if (allIncluded) return true;
  }

  if (correctNorm === "bibeln" && inputNorm.includes("bibeln")) return true;
  if (correctNorm === "torah, tanakh" && inputNorm.includes("torah")) return true;
  if (correctNorm === "shia och sunni" && (inputNorm.includes("shia") || inputNorm.includes("sunni"))) return true;
  if (correctNorm === "jesus, abraham" && (inputNorm.includes("jesus") || inputNorm.includes("abraham"))) return true;
  if (correctNorm === "moses, abraham" && (inputNorm.includes("moses") || inputNorm.includes("abraham"))) return true;
  if (correctNorm === "muhammed, abraham" && (inputNorm.includes("muhammed") || inputNorm.includes("abraham"))) return true;
  if (correctNorm === "pask, jul" && (inputNorm.includes("pask") || inputNorm.includes("jul"))) return true;
  if (correctNorm === "chanukka, pesach, bar bat mitzva" && (inputNorm.includes("chanukka") || inputNorm.includes("pesach") || inputNorm.includes("mitzva"))) return true;
  if (correctNorm === "ramadan, eid al fitr" && (inputNorm.includes("ramadan") || inputNorm.includes("eid"))) return true;

  return false;
}

function check() {
  const input = document.getElementById("answer").value;
  const isCorrect = valueMatches(input, currentQuestion.answer);

  if (isCorrect) {
    stats.correct++;
    stats.total++;
    document.getElementById("feedback").innerText = "Rätt";
    flash(true);
  } else {
    stats.wrong++;
    stats.total++;
    document.getElementById("feedback").innerText = "Fel. Rätt svar: " + prettyValue(currentQuestion.answer);
    flash(false);
  }

  updateLiveStats();
  setTimeout(nextQuestion, 1000);
}

function finishRound() {
  const percent = stats.total === 0 ? 0 : Math.round((stats.correct / stats.total) * 100);
  const text =
    "Rätt: <b>" + stats.correct + "</b><br>" +
    "Fel: <b>" + stats.wrong + "</b><br>" +
    "Totalt: <b>" + stats.total + "</b><br>" +
    "Procent: <b>" + percent + "%</b>";

  if (mode === "final") {
    document.getElementById("score").innerHTML = text;
    go("result");
  } else {
    document.getElementById("roundStats").innerHTML = text;
    go("roundDone");
  }
}

function flash(ok) {
  document.body.style.background = ok ? "#dff5e5" : "#fbe4e2";
  setTimeout(() => {
    document.body.style.background = "#f5f5f5";
  }, 400);
}

function enterCheck(e) {
  if (e.key === "Enter" && !document.getElementById("answer").classList.contains("hidden")) {
    check();
  }
}

function openOnepager(religion) {
  currentOnepagerReligion = religion;
  document.getElementById("onepagerTitle").innerText = "Onepager: " + prettyReligion(religion);

  const wrap = document.getElementById("onepagerFields");
  wrap.innerHTML = "";

  categories.forEach(cat => {
    const row = document.createElement("div");
    row.className = "oneRow";

    const label = document.createElement("label");
    label.textContent = categoryNames[cat];

    const input = document.createElement("textarea");
    input.id = "one_" + cat;
    input.placeholder = "Skriv " + categoryNames[cat] + "...";

    row.appendChild(label);
    row.appendChild(input);
    wrap.appendChild(row);
  });

  document.getElementById("onepagerResult").classList.add("hidden");
  document.getElementById("onepagerResult").innerHTML = "";
  go("onepager");
}

function checkOnepager() {
  const resultBox = document.getElementById("onepagerResult");
  let correctCount = 0;
  let html = "";

  categories.forEach(cat => {
    const userValue = document.getElementById("one_" + cat).value;
    const correctValue = data[currentOnepagerReligion][cat];
    const ok = valueMatches(userValue, correctValue);

    if (ok) correctCount++;

    html += `
      <div class="resultLine">
        <b>${categoryNames[cat]}</b><br>
        Din text: ${userValue ? userValue : "<i>inget svar</i>"}<br>
        Facit: ${prettyValue(correctValue)}<br>
        Resultat: <span class="${ok ? "good" : "bad"}">${ok ? "Rätt" : "Fel"}</span>
      </div>
    `;
  });

  const percent = Math.round((correctCount / categories.length) * 100);

  resultBox.innerHTML =
    "<b>Poäng:</b> " + correctCount + " av " + categories.length + " rätt<br>" +
    "<b>Procent:</b> " + percent + "%<br><br>" + html;

  resultBox.classList.remove("hidden");
}

function fillOnepagerHints() {
  categories.forEach(cat => {
    document.getElementById("one_" + cat).value = prettyValue(data[currentOnepagerReligion][cat]);
  });
}
</script>
</body>
</html>
